# === Localisation ===
d-i debian-installer/country string FR
d-i debian-installer/language string fr
d-i keyboard-configuration/xkb-keymap select us

# === Mirror Debian ===
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### APT setup
# d-i mirror/suite string testing
d-i apt-setup/use_mirror boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/firmware boolean true

# === Users ===
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$niFAdm0Z.owaBGkW$wh/AarrdtYSkNloHMRNcKZbwp205XsHnKGOXhIWVx0qi95LoHIEmGEEGHZhsG4zxWsH1cxwnTjHWHBvB5Z3U.1
d-i passwd/user-fullname string cedric
d-i passwd/username string cedric
d-i passwd/user-password-crypted password $6$niFAdm0Z.owaBGkW$wh/AarrdtYSkNloHMRNcKZbwp205XsHnKGOXhIWVx0qi95LoHIEmGEEGHZhsG4zxWsH1cxwnTjHWHBvB5Z3U.1
d-i passwd/user-default-groups string sudo audio video

# === Package selection ===
d-i pkgsel/include string vim make git nnn gcc sudo build-essential meson cmake ninja-build locales-all curl wget fzf tmux silversearcher-ag universal-ctags npm xinit xorg xdotool numlockx x11-utils arandr libreadline-dev libx11-dev libxinerama-dev libxft-dev libxrandr-dev clang-format vim-gtk3 fonts-agave fonts-hack fonts-hack-otf fonts-hack-ttf fonts-hack-web greetd dunst pavucontrol pulseaudio pulseaudio-utils trash-cli libxcb-util-dev firefox-esr rsync just moc zsh zsh-autosuggestions zsh-syntax-highlighting hsetroot libxcomposite-dev libxdamage-dev libxfixes-dev libxrender-dev
popularity-contest popularity-contest/participate boolean false
tasksel tasksel/first multiselect ssh-server, standard

# === Timezone ===
d-i time/zone string Etc/UTC

# === Disk partitioning (NO CONFIRM) ===
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# === GRUB ===
d-i grub-installer/only_debian boolean true

# === Finish ===
d-i finish-install/reboot_in_progress note

# === Post-install commands ===
d-i preseed/late_command string \
    in-target sed -i 's/^GRUB_TIMEOUT=.*/GRUB_TIMEOUT=2/' /etc/default/grub ; \
    in-target sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT=\"quiet splash\"/' /etc/default/grub ; \
    in-target update-grub
